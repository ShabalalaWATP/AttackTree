version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    environment:
      - ATB_DATABASE_URL=sqlite+aiosqlite:///./data/attacktree.db
      - ATB_SECRET_KEY=${ATB_SECRET_KEY:-change-me-in-production}
      - ATB_LOG_LEVEL=INFO
    restart: unless-stopped
